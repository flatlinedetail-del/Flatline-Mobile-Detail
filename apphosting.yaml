runConfig:
  runtime: nodejs20
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2

env:
  - variable: NODE_ENV
    value: production
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: VITE_GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: SENDGRID_API_KEY
    secret: SENDGRID_API_KEY
  - variable: SENDGRID_FROM_EMAIL
    secret: SENDGRID_FROM_EMAIL
  - variable: SENDGRID_FROM_NAMES
    secret: SENDGRID_FROM_NAMES
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: VITE_GOOGLE_MAPS_API_KEY
    secret: VITE_GOOGLE_MAPS_API_KEY
  - variable: VITE_OPENWEATHER_API_KEY
    secret: VITE_OPENWEATHER_API_KEY
  - variable: VITE_EIA_API_KEY
    secret: VITE_EIA_API_KEY
  - variable: PUBLIC_APP_URL
    value: https://gen-lang-client-0494336976.web.app
